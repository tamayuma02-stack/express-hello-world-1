<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chat + Paint</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #1a1a2e;
      color: #eee;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    header {
      background: #16213e;
      padding: 10px 18px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid #0f3460;
      flex-shrink: 0;
    }
    header h1 { font-size: 1.05rem; color: #e94560; }
    #my-id-label { font-size: 0.8rem; color: #7ec8e3; }
    #user-count { font-size: 0.8rem; color: #aaa; }

    .main { display: flex; flex: 1; overflow: hidden; }

    /* ---- Chat ---- */
    .chat-panel {
      display: flex;
      flex-direction: column;
      width: 360px;
      min-width: 260px;
      border-right: 1px solid #0f3460;
    }

    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      list-style: none;
    }
    #messages::-webkit-scrollbar { width: 4px; }
    #messages::-webkit-scrollbar-thumb { background: #0f3460; border-radius: 2px; }

    .msg { display: flex; flex-direction: column; max-width: 86%; }
    .msg.mine   { align-self: flex-end;   align-items: flex-end; }
    .msg.others { align-self: flex-start; align-items: flex-start; }
    .msg.system { align-self: center; align-items: center; }

    .msg-meta { font-size: 0.69rem; color: #777; margin-bottom: 2px; }
    .bubble {
      padding: 7px 12px;
      border-radius: 14px;
      font-size: 0.88rem;
      line-height: 1.45;
      word-break: break-word;
    }
    .msg.mine   .bubble { background: #e94560; color: #fff; border-bottom-right-radius: 3px; }
    .msg.others .bubble { background: #16213e; border: 1px solid #0f3460; border-bottom-left-radius: 3px; }
    .msg.system .bubble { background: transparent; color: #555; font-size: 0.74rem; font-style: italic; padding: 1px 0; }
    .bubble img { max-width: 180px; max-height: 180px; border-radius: 8px; display: block; cursor: zoom-in; }

    .chat-form {
      display: flex;
      align-items: center;
      padding: 8px 10px;
      gap: 6px;
      border-top: 1px solid #0f3460;
      background: #16213e;
      flex-shrink: 0;
    }
    #chat-input {
      flex: 1;
      padding: 8px 14px;
      background: #0f3460;
      border: 1px solid #1a4a7a;
      border-radius: 20px;
      color: #eee;
      font-size: 0.88rem;
      outline: none;
    }
    #chat-input:focus { border-color: #e94560; }
    .btn { padding: 8px 14px; border: none; border-radius: 20px; cursor: pointer; font-size: 0.85rem; transition: opacity 0.15s; }
    .btn:hover { opacity: 0.8; }
    .btn-send { background: #e94560; color: #fff; }
    .btn-img  { background: #0f3460; color: #7ec8e3; padding: 8px 11px; }

    /* ---- Canvas ---- */
    .canvas-panel { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

    .canvas-toolbar {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 7px 14px;
      background: #16213e;
      border-bottom: 1px solid #0f3460;
      flex-shrink: 0;
    }
    .canvas-toolbar label { font-size: 0.78rem; color: #aaa; }
    #color-picker {
      width: 30px; height: 30px;
      border: 2px solid #0f3460;
      border-radius: 6px;
      cursor: pointer;
      padding: 0;
      background: none;
    }
    #brush-size { width: 80px; accent-color: #e94560; }
    #brush-preview {
      display: inline-block;
      border-radius: 50%;
      background: #000;
      flex-shrink: 0;
    }
    .btn-clear { background: #7f1d1d; color: #fca5a5; padding: 5px 12px; font-size: 0.78rem; margin-left: auto; }

    .canvas-wrap { flex: 1; overflow: auto; padding: 10px; }
    #canvas { border: 1px solid #0f3460; cursor: crosshair; background: #fff; border-radius: 3px; }

    /* ---- Lightbox ---- */
    #lightbox {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.88);
      z-index: 999;
      align-items: center;
      justify-content: center;
      cursor: zoom-out;
    }
    #lightbox.open { display: flex; }
    #lightbox img { max-width: 90vw; max-height: 90vh; border-radius: 6px; pointer-events: none; }
  </style>
</head>
<body>

<header>
  <h1>Chat + Paint</h1>
  <span id="my-id-label"></span>
  <span id="user-count">接続中: --</span>
</header>

<div class="main">
  <div class="chat-panel">
    <ul id="messages"></ul>
    <form class="chat-form" id="chat-form">
      <button type="button" class="btn btn-img" id="img-btn" title="画像を送る">📎</button>
      <input type="file" id="file-input" accept="image/*" style="display:none" />
      <input id="chat-input" autocomplete="off" placeholder="メッセージを入力..." />
      <button type="submit" class="btn btn-send">送信</button>
    </form>
  </div>

  <div class="canvas-panel">
    <div class="canvas-toolbar">
      <label>色</label>
      <input type="color" id="color-picker" value="#000000" />
      <label>太さ</label>
      <input type="range" id="brush-size" min="1" max="30" value="3" />
      <span id="brush-preview"></span>
      <button type="button" class="btn btn-clear" id="clear-btn">クリア</button>
    </div>
    <div class="canvas-wrap">
      <canvas id="canvas" width="800" height="600"></canvas>
    </div>
  </div>
</div>

<div id="lightbox">
  <img id="lightbox-img" src="" alt="" />
</div>

<script>
  function escHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')
  }

  function main() {
    const host = location.origin.replace(/^http/, 'ws')
    const ws = new WebSocket(host + '/ws')
    const myId = self.crypto.randomUUID().substr(0, 8)

    document.getElementById('my-id-label').textContent = `あなた: ${myId}`

    // ---- User colors ----
    const userColors = {}
    function getColor(id) {
      if (!userColors[id]) {
        const hue = [...id].reduce((acc, c) => acc + c.charCodeAt(0), 0) % 360
        userColors[id] = `hsl(${hue}, 55%, 65%)`
      }
      return userColors[id]
    }

    // ---- Messages ----
    const messageList = document.getElementById('messages')

    function addSystemMsg(text) {
      const li = document.createElement('li')
      li.className = 'msg system'
      const bubble = document.createElement('div')
      bubble.className = 'bubble'
      bubble.textContent = text
      li.appendChild(bubble)
      messageList.appendChild(li)
      messageList.scrollTop = messageList.scrollHeight
    }

    function createMsgLi(id) {
      const isMine = id === myId
      const li = document.createElement('li')
      li.className = `msg ${isMine ? 'mine' : 'others'}`
      const now = new Date().toLocaleTimeString('ja-JP', { hour: '2-digit', minute: '2-digit' })
      const meta = document.createElement('div')
      meta.className = 'msg-meta'
      if (!isMine) meta.style.color = getColor(id)
      meta.textContent = `${isMine ? '自分' : id}  ${now}`
      li.appendChild(meta)
      return li
    }

    function addTextMsg(id, text) {
      const li = createMsgLi(id)
      const bubble = document.createElement('div')
      bubble.className = 'bubble'
      bubble.textContent = text
      li.appendChild(bubble)
      messageList.appendChild(li)
      messageList.scrollTop = messageList.scrollHeight
    }

    function addImageMsg(id, dataUrl) {
      const li = createMsgLi(id)
      const bubble = document.createElement('div')
      bubble.className = 'bubble'
      const img = document.createElement('img')
      img.src = dataUrl
      img.alt = '画像'
      img.addEventListener('click', () => openLightbox(dataUrl))
      bubble.appendChild(img)
      li.appendChild(bubble)
      messageList.appendChild(li)
      messageList.scrollTop = messageList.scrollHeight
    }

    // ---- Lightbox ----
    const lightbox = document.getElementById('lightbox')
    const lightboxImg = document.getElementById('lightbox-img')

    function openLightbox(src) {
      lightboxImg.src = src
      lightbox.classList.add('open')
    }
    lightbox.addEventListener('click', () => lightbox.classList.remove('open'))

    // ---- Canvas ----
    const canvas = document.getElementById('canvas')
    const ctx = canvas.getContext('2d')
    const drawingState = {}
    let myColor = '#000000'
    let mySize = 3
    let localDrawing = false

    const colorPicker = document.getElementById('color-picker')
    const brushSizeInput = document.getElementById('brush-size')
    const brushPreview = document.getElementById('brush-preview')

    function updatePreview() {
      const sz = Math.max(4, Math.min(mySize, 24))
      brushPreview.style.width = sz + 'px'
      brushPreview.style.height = sz + 'px'
      brushPreview.style.background = myColor
    }
    updatePreview()

    colorPicker.addEventListener('input', (e) => { myColor = e.target.value; updatePreview() })
    brushSizeInput.addEventListener('input', (e) => { mySize = +e.target.value; updatePreview() })

    document.getElementById('clear-btn').addEventListener('click', () => {
      ws.send(JSON.stringify({ type: 'clear' }))
    })

    function sendDraw(e, control) {
      ws.send(JSON.stringify({
        type: 'paint', id: myId,
        x: e.offsetX, y: e.offsetY,
        control, color: myColor, size: mySize
      }))
    }

    canvas.addEventListener('mousedown', (e) => { localDrawing = true;  sendDraw(e, 'mousedown') })
    canvas.addEventListener('mousemove', (e) => { if (localDrawing) sendDraw(e, 'mousemove') })
    canvas.addEventListener('mouseup',   (e) => { localDrawing = false; sendDraw(e, 'mouseup') })
    canvas.addEventListener('mouseout',  (e) => { localDrawing = false; sendDraw(e, 'mouseout') })

    function applyDraw(msg) {
      const { id, x, y, control, color, size } = msg
      ctx.strokeStyle = color || '#000'
      ctx.lineWidth   = size  || 3
      ctx.lineCap     = 'round'
      ctx.lineJoin    = 'round'
      if (control === 'mousedown') {
        drawingState[id] = true
        ctx.beginPath()
        ctx.moveTo(x, y)
      } else if (control === 'mousemove' && drawingState[id]) {
        ctx.lineTo(x, y)
        ctx.stroke()
      } else if (control === 'mouseup' || control === 'mouseout') {
        drawingState[id] = false
        ctx.beginPath()
      }
    }

    // ---- Image upload ----
    document.getElementById('img-btn').addEventListener('click', () => {
      document.getElementById('file-input').click()
    })
    document.getElementById('file-input').addEventListener('change', (e) => {
      const file = e.target.files[0]
      if (!file) return
      if (file.size > 2 * 1024 * 1024) {
        alert('2MB以下の画像を選んでください')
        e.target.value = ''
        return
      }
      const reader = new FileReader()
      reader.onload = (ev) => {
        ws.send(JSON.stringify({ type: 'image', id: myId, data: ev.target.result }))
      }
      reader.readAsDataURL(file)
      e.target.value = ''
    })

    // ---- WebSocket ----
    ws.onopen = () => {
      ws.send(JSON.stringify({ type: 'join', id: myId }))
    }

    ws.onmessage = (event) => {
      const msg = JSON.parse(event.data)
      if      (msg.type === 'chat')      addTextMsg(msg.id, msg.text)
      else if (msg.type === 'image')     addImageMsg(msg.id, msg.data)
      else if (msg.type === 'paint')     applyDraw(msg)
      else if (msg.type === 'clear')     ctx.clearRect(0, 0, canvas.width, canvas.height)
      else if (msg.type === 'join')      addSystemMsg(`${msg.id} が参加しました`)
      else if (msg.type === 'leave')     addSystemMsg(`${msg.id} が退出しました`)
      else if (msg.type === 'userCount') document.getElementById('user-count').textContent = `接続中: ${msg.count}人`
    }

    document.getElementById('chat-form').addEventListener('submit', (e) => {
      e.preventDefault()
      const input = document.getElementById('chat-input')
      const text = input.value.trim()
      if (!text) return
      ws.send(JSON.stringify({ type: 'chat', id: myId, text }))
      input.value = ''
      input.focus()
    })

    ws.onerror = (err) => console.error('WebSocket Error:', err)
  }

  main()
</script>
</body>
</html>
